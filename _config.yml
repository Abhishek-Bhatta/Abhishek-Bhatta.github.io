title: My Work Blog
description: Notes on AI-assisted development — workflows, failure modes, and what actually works.
theme: minima
remote_theme: jekyll/minima

permalink: /:year/:month/:day/:title/

exclude:
  - drafts/
  - CLAUDE.md
  - README.md
  - cleanup-response.md

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: drafts
    values:
      layout: post
